name: tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Princípio do menor privilégio — workflow só precisa ler o repo.
permissions:
  contents: read

jobs:
  test:
    name: smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Smoke tests pra 5 fluxos críticos (vitest):
      # 1. HMAC válido vs forjado (webhook MP)
      # 2. Cupom: eq não ilike, sem comissao_percent
      # 3. Auth: normalizeEmail/Password helpers
      # 4. Trips: randomSlug invariants
      # 5. AfiliadoPainel RPC: wildcard sanitization (smoke real só com secrets — ver job tests-real abaixo)
      - name: Run smoke tests
        run: npm test

  tests-real:
    # Smoke tests REAIS contra Supabase prod — só roda em push pra main
    # (não em PRs de fork, que não recebem secrets por segurança).
    # Pega regressão tipo "alguém troca UPPER(cupom) = v_cupom por
    # cupom ILIKE v_cupom em migration futura" que escapa o smoke local.
    name: tests com Supabase real
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # R32: secrets.X NÃO pode ser usado em `if:` no nível do job
    # (limitação documentada do GitHub Actions — contexts.md). Antes a
    # R12-7 tentava `secrets.VITE_SUPABASE_URL != ''` aqui e o workflow
    # ficou inválido, bloqueando merge. Agora a checagem foi pro step
    # Check secrets que expõe outputs.skip; steps seguintes condicionam
    # em steps.check.outputs.skip != 'true'. Trade-off: job aparece
    # como ✓ na UI mesmo quando skip — warning no log explica.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
    steps:
      - name: Check secrets
        id: check
        run: |
          if [ -z "${VITE_SUPABASE_URL}" ] || [ -z "${VITE_SUPABASE_ANON_KEY}" ]; then
            echo "::warning::Secrets VITE_SUPABASE_URL/ANON_KEY ausentes — pulando tests-real. Configure em Settings → Secrets pra ativar."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v4
      - if: steps.check.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - if: steps.check.outputs.skip != 'true'
        run: npm ci
      - if: steps.check.outputs.skip != 'true'
        name: Smoke tests com Supabase
        run: npm test

  build:
    name: production build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      # Build não pode quebrar — pega type/syntax errors que o test miss.
      - run: npm run build

  lint:
    # R12-7: lint roda mas NÃO bloqueia merge.
    # eslint.config.js usa react-hooks v7 com regras estritas tipo
    # set-state-in-effect que pegam padrões legados no código atual
    # (50 erros agora). Marcar como blocker travaria todos os PRs até
    # uma limpeza grande. continue-on-error: true torna a saída
    # informativa — devs veem o report no PR, dá pra ir reduzindo em
    # commits subsequentes, mas o sinal vermelho não trava deploy.
    # Quando o número cair pra zero, flipar continue-on-error pra
    # false e travar regressões a partir dali.
    name: lint (informational)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
