name: tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Smoke tests pra 5 fluxos críticos (vitest):
      # 1. HMAC válido vs forjado (webhook MP)
      # 2. Cupom: eq não ilike, sem comissao_percent
      # 3. Auth: normalizeEmail/Password helpers
      # 4. Trips: randomSlug invariants
      # 5. AfiliadoPainel RPC: wildcard rejected (smoke real só com secrets)
      - name: Run smoke tests
        run: npm test

  build:
    name: production build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      # Build não pode quebrar — pega type/syntax errors que o test miss.
      - run: npm run build
