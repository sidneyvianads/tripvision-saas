[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"
  edge_functions = "netlify/edge-functions"

[context.production.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"

[functions."plan"]
  timeout = 26

[functions."chat"]
  timeout = 26

[[edge_functions]]
  function = "og"
  path = "/v/:slug"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
