[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"
  edge_functions = "netlify/edge-functions"

[context.production.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"

[functions."plan"]
  timeout = 26

[functions."chat"]
  timeout = 26

[functions."reconcile-subscriptions"]
  timeout = 26

[functions."export-user-data"]
  timeout = 26

[[edge_functions]]
  function = "og"
  path = "/v/:slug"

# Canonical: força tudo em tripvision-saas.netlify.app pra viajjei.com.br
[[redirects]]
  from = "https://tripvision-saas.netlify.app/*"
  to = "https://viajjei.com.br/:splat"
  status = 301
  force = true

# www → apex
[[redirects]]
  from = "https://www.viajjei.com.br/*"
  to = "https://viajjei.com.br/:splat"
  status = 301
  force = true

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
