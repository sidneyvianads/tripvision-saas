[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"
  edge_functions = "netlify/edge-functions"

[context.production.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"

[functions."plan"]
  timeout = 26

[functions."chat"]
  timeout = 26

[functions."reconcile-subscriptions"]
  timeout = 26

[functions."export-user-data"]
  timeout = 26

[functions."cron-truncate-ia-conversas"]
  timeout = 26

# R33: edge function og.mjs DESABILITADA temporariamente. Netlify
# functions-origin retornava 503 ao subir o bundle (2 tentativas
# seguidas), bloqueando o deploy inteiro — incluindo o paywall do R31
# que precisa entrar em prod. Trade-off: preview de /v/:slug no
# WhatsApp/Twitter fica sem meta tags personalizadas (cai pra
# og-default.png + título genérico de index.html). O app em si
# continua funcionando normal via SPA fallback.
#
# Arquivo renomeado pra og.mjs.disabled pra Netlify ignorar no bundle.
# Quando descobrir a causa do 503, restaurar: git mv + descomentar.
#
# [[edge_functions]]
#   function = "og"
#   path = "/v/:slug"

# Canonical: força tudo em tripvision-saas.netlify.app pra viajjei.com.br
[[redirects]]
  from = "https://tripvision-saas.netlify.app/*"
  to = "https://viajjei.com.br/:splat"
  status = 301
  force = true

# www → apex
[[redirects]]
  from = "https://www.viajjei.com.br/*"
  to = "https://viajjei.com.br/:splat"
  status = 301
  force = true

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ───── Security headers (R7-7 + R12-6) ─────────────────────────────────
# Defense-in-depth: mesmo com XSS sanitization (R7-5), reduz superfície.
[[headers]]
  for = "/*"
  [headers.values]
    # Clickjacking: app não pode ser embedado em iframe.
    X-Frame-Options = "DENY"
    # MIME-sniffing: força browser a respeitar Content-Type.
    X-Content-Type-Options = "nosniff"
    # Referrer: não vaza path/query pra terceiros (links externos pra
    # hotéis, IG de afiliados, etc).
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Permissions: bloqueia features sensíveis. geolocation=(self) permite
    # nosso código (futuro "minha localização" no Diário); camera/mic
    # zerados.
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self), payment=(self)"
    # HSTS: força HTTPS por 1 ano. Netlify já redireciona http→https,
    # isto endurece pra browsers respeitarem mesmo offline.
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    # R12-6: CSP só com connect-src — não restringe scripts/styles/imgs
    # (sem default-src, outros recurso-types ficam open). Lista travada:
    # 'self' cobre /api/* e edge functions; supabase https + wss
    # (realtime); fonts.googleapis pro CSS do Google Fonts; posthog se
    # ativado; sentry ingest se ativado. MP/Anthropic NÃO entram porque
    # são server-side (Netlify Functions chamam, frontend não).
    # Se CSP bloquear algo em prod, o browser loga "Refused to connect
    # to ... because it violates CSP" — desativar este header é o
    # rollback rápido.
    Content-Security-Policy = "connect-src 'self' https://mucwvugadqksassosixn.supabase.co wss://mucwvugadqksassosixn.supabase.co https://fonts.googleapis.com https://fonts.gstatic.com https://us.i.posthog.com https://*.ingest.sentry.io"
